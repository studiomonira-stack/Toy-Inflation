services:
  - type: web
    name: leksaksinflation
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py createsuperuser --noinput --username admin --email admin@leksaksinflation.se"
    startCommand: "gunicorn toyinflation.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "Salih2013?"